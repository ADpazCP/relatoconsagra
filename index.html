<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA ADPAZ - Gestão de Consagrados</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; padding: 12px; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .main-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .header-compacta { 
            border-bottom: 2px solid #3273dc; 
            margin-bottom: 20px; 
            padding-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        th { background-color: #3273dc !important; color: white !important; white-space: nowrap; font-size: 0.75rem; text-transform: uppercase; }
        .nome-link { color: #3273dc; cursor: pointer; font-weight: bold; }
        .nome-link:hover { text-decoration: underline; color: #1d4ed8; }
        
        .badge-count { background: #3273dc; color: white; padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 0.85rem; }
        .btn-sync { margin-left: 8px; }

        .detail-item { border-bottom: 1px solid #f0f0f0; padding: 10px 0; }
        .detail-label { font-size: 0.65rem; color: #888; text-transform: uppercase; font-weight: bold; margin-bottom: 2px; }
        .detail-value { font-size: 1rem; color: #333; }
        
        @media screen and (max-width: 768px) {
            .header-compacta { flex-direction: row; }
            .title-main { font-size: 1.1rem !important; margin: 0 !important; }
        }
    </style>
</head>
<body>

<div class="container is-fluid">
    <div class="main-card">
        
        <div class="header-compacta">
            <div>
                <h1 class="title is-5 has-text-link title-main">ADPAZ GESTÃO</h1>
            </div>
            <div class="is-flex is-align-items-center">
                <span class="badge-count" id="totalReg">0 Registros</span>
                <button class="button is-link is-small btn-sync" id="btnSync" onclick="carregarDados()" title="Sincronizar Planilha">
                    <span class="icon"><i class="fas fa-sync-alt"></i></span>
                </button>
            </div>
        </div>

        <div class="columns is-multiline is-variable is-1 mb-4">
            <div class="column is-3-tablet is-12-mobile">
                <label class="label is-small">Pesquisar Nome</label>
                <input class="input is-small" id="fNome" type="text" placeholder="Digite para buscar..." oninput="filtrar()">
            </div>
            <div class="column is-3-tablet is-4-mobile">
                <label class="label is-small">Congregação</label>
                <div class="select is-small is-fullwidth">
                    <select id="fCong" onchange="filtrar()"><option value="">Carregando...</option></select>
                </div>
            </div>
            <div class="column is-3-tablet is-4-mobile">
                <label class="label is-small">Cargo</label>
                <div class="select is-small is-fullwidth">
                    <select id="fCargo" onchange="filtrar()"><option value="">Todos</option></select>
                </div>
            </div>
            <div class="column is-3-tablet is-4-mobile">
                <label class="label is-small">Critério</label>
                <div class="select is-small is-fullwidth">
                    <select id="fCrit" onchange="filtrar()"><option value="">Todos</option></select>
                </div>
            </div>
        </div>

        <div class="table-container">
            <table class="table is-fullwidth is-hoverable is-narrow is-striped">
                <thead>
                    <tr>
                        <th style="width: 50px;">Nº</th>
                        <th>Candidato</th>
                        <th>Congregação</th>
                    </tr>
                </thead>
                <tbody id="tabelaBody">
                    <tr><td colspan="3" class="has-text-centered">Aguardando dados...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="modalFicha" class="modal">
    <div class="modal-background" onclick="fecharModal()"></div>
    <div class="modal-card">
        <header class="modal-card-head py-2">
            <p class="modal-card-title is-size-6">Ficha Individual do Consagrado</p>
            <button class="delete" aria-label="close" onclick="fecharModal()"></button>
        </header>
        <section class="modal-card-body px-5" id="conteudoFicha"></section>
        <footer class="modal-card-foot py-2 is-justify-content-center">
            <button class="button is-link is-small" onclick="fecharModal()">Fechar</button>
        </footer>
    </div>
</div>

<script>
    const URL_APP = "https://script.google.com/macros/s/AKfycby8cJYoRKlK94FDzJwjWyHGZxi14m2P9ZpIF3Pmemc-hOXOl-U5uKYsXNx1QNXUI0dV/exec";
    let dadosLocais = [];

    window.onload = carregarDados;

    function carregarDados() {
        document.getElementById('btnSync').classList.add('is-loading');
        const script = document.createElement('script');
        script.src = `${URL_APP}?callback=receberDados`;
        document.body.appendChild(script);
    }

    function receberDados(dados) {
        dadosLocais = dados;
        document.getElementById('btnSync').classList.remove('is-loading');
        gerarFiltroDinamico('fCong', 16, "Congregações");
        gerarFiltroDinamico('fCargo', 17, "Cargos");
        gerarFiltroDinamico('fCrit', 18, "Critérios");
        renderizar(dados);
    }

    function gerarFiltroDinamico(idElemento, colunaIndex, textoPadrao) {
        const select = document.getElementById(idElemento);
        const valoresUnicos = [...new Set(dadosLocais.map(item => item[colunaIndex]))]
                              .filter(v => v && v.toString().trim() !== "")
                              .sort();
        select.innerHTML = `<option value="">${textoPadrao}</option>`;
        valoresUnicos.forEach(valor => { 
            select.innerHTML += `<option value="${valor}">${valor}</option>`; 
        });
    }

    function renderizar(lista) {
        const corpo = document.getElementById('tabelaBody');
        document.getElementById('totalReg').innerText = `${lista.length} Registros`;
        corpo.innerHTML = '';
        
        lista.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="is-size-7 has-text-grey">${index + 1}</td>
                <td class="nome-link" onclick="abrirFicha(${index})">${item[1]}</td>
                <td>${item[16] || '-'}</td>
            `;
            corpo.appendChild(tr);
        });
    }

    function filtrar() {
        const nome = document.getElementById('fNome').value.toUpperCase();
        const cong = document.getElementById('fCong').value;
        const cargo = document.getElementById('fCargo').value;
        const crit = document.getElementById('fCrit').value;

        const resultado = dadosLocais.filter(l => {
            return l[1].toString().toUpperCase().includes(nome) &&
                   (cong === "" || l[16] === cong) &&
                   (cargo === "" || l[17] === cargo) &&
                   (crit === "" || l[18] === crit);
        });
        renderizar(resultado);
    }

    function abrirFicha(idx) {
        const p = dadosLocais[idx];
        const box = document.getElementById('conteudoFicha');
        const estadoCivil = p[7] || '---';
        const nomeConjuge = p[8] && p[8].trim() !== "" && p[8].toUpperCase() !== "NÃO INFORMADO" ? p[8] : null;

        box.innerHTML = `
            <div class="detail-item">
                <p class="detail-label">Candidato</p>
                <p class="detail-value has-text-weight-bold has-text-link is-size-5">${p[1]}</p>
            </div>
            
            <div class="detail-item">
                <p class="detail-label">Cargo / Critério</p>
                <p class="detail-value has-text-weight-semibold">
                    ${p[17]} <span class="has-text-grey">(${p[18]})</span>
                </p>
            </div>

            <div class="detail-item">
                <p class="detail-label">Estado Civil ${nomeConjuge ? '/ Cônjuge' : ''}</p>
                <p class="detail-value">
                    <span class="has-text-weight-semibold">${estadoCivil}</span>
                    ${nomeConjuge ? `<span class="has-text-grey mx-2">|</span> ${nomeConjuge}` : ''}
                </p>
            </div>

            <div class="detail-item">
                <p class="detail-label">Telefone de Contato</p>
                <p class="detail-value">${p[15] || '---'}</p>
            </div>

            <div class="detail-item">
                <p class="detail-label">Localização (Endereço)</p>
                <p class="detail-value is-size-7">
                    <i class="fas fa-map-marker-alt has-text-danger mr-1"></i>
                    ${p[9] || ''}, ${p[11] || ''} - ${p[13] || ''}/${p[14] || ''}
                </p>
            </div>

            <div class="detail-item">
                <p class="detail-label">Congregação Vinculada</p>
                <p class="detail-value">${p[16] || '---'}</p>
            </div>

            <div class="detail-item">
                <p class="detail-label">Número de Registro (ID)</p>
                <p class="detail-value has-text-weight-bold is-family-monospace" style="color: #444;">
                    ${p[20] || 'S/N'}
                </p>
            </div>
        `;
        document.getElementById('modalFicha').classList.add('is-active');
    }

    function fecharModal() {
        document.getElementById('modalFicha').classList.remove('is-active');
    }
</script>
</body>
</html>
